<!DOCTYPE html>
<html>

<head>

</head>

<canvas id="gamecanvas"></canvas>

<script>

var doodleAcceleration = 9.8;
var doodleSpeed;
var canvasContext;
var canvas;
var doodleX = 175;
var doodleY = 600

const DOODLE_WIDTH = 30;
const DOODLE_HEIGHT = 30;
    let platforms = [];
    let player = {
        x: doodleX,
        y: doodleY,
        width: DOODLE_WIDTH,
        height: DOODLE_HEIGHT,
        dx: 0,
        dy: 5
    };

const PLATFORM_WIDTH = 70;
const PLATFORM_HEIGHT = 10;


//generate canvas, taken from game assignment 2


window.onload = function() { //waits until window is loaded
    
    console.log("Hello World!");//tests to make sure it works

    canvas = document.getElementById('gamecanvas');
    canvasContext = canvas.getContext('2d'); //retrieves state of canvas and sets it to variable

    canvas.width = 400;//set canvas size and fps
    canvas.height = 800;
    var framesPerSecond = 600;

    canvasContext.fillStyle = "cyan";//background
    canvasContext.fillRect(0,0,canvas.width,canvas.height);





    generatePlatform();//fills the platform array with platforms
    setInterval(function() {
        //put in drawing functions here
        update();
        draw(); 
        playerFall();
        scrollUp();
        checkLose();
    }, 1000/framesPerSecond);//will now run every 1000 ticks, one second


}

//movement left and right
document.addEventListener("keydown", ()=>{
    if (event.key === "ArrowLeft"){
        player.dx = -1.5;
    }
    if (event.key === "ArrowRight"){
        player.dx = 1.5;
    }
})
document.addEventListener("keyup", ()=>{
    player.dx = 0;
})

function update(){
    player.x += player.dx;
}

//draw everything according to thr values recorded in the arrays

function draw() {
    canvasContext.fillStyle = "cyan";//background
    canvasContext.fillRect(0,0,canvas.width,canvas.height);


//   // Player
  canvasContext.fillStyle = "green";
  canvasContext.fillRect(player.x, player.y, player.width, +player.height);


  // Platforms
  canvasContext.fillStyle = "black";
  platforms.forEach(p => {
    canvasContext.fillRect(p.x, p.y, p.width, p.height);
  });
}


//create platforms
function generatePlatform(){



    for (i = 0;i < 9;i++){//randomizes horizontal position and sets other platform variables, ten platforms
    var platformX = Math.random() * 330;
    var platformY = canvas.height - (i * 100) - 20;
    platforms.push({
        x: platformX, 
        y: platformY, 
        width: PLATFORM_WIDTH, 
        height: PLATFORM_HEIGHT
    });
}



}
//player speed/bounce, put after draw to calculate new speed.

function playerFall(){//if dy is negative, the player is falling
    player.dy -= .05;//gravity, increases the speed of the fall
    player.y -= player.dy;


    if (player.dy<0){
        platforms.forEach(platform => {
            if (
                ((player.y + DOODLE_HEIGHT) >= (platform.y)) &&
                ((player.y + DOODLE_HEIGHT) <= (platform.y + PLATFORM_HEIGHT))
                
                && (
                (player.x>platform.x) && 
                (player.x<(platform.x+PLATFORM_WIDTH))//if the player is at the same vertical level as the platform and if the left edge is in between the x values of the platform
                ||
                ((player.x+DOODLE_WIDTH)>platform.x) && 
                ((player.x+DOODLE_WIDTH)<(platform.x+PLATFORM_WIDTH))//if the player is at the same vertical level as the platform  and if the right edge is between the x values of the platform

            )
            // || ((player.y+DOODLE_HEIGHT)>canvas.height)
        ){
                player.dy = 5;
            }
        })
    }
}




//scroll up (move platforms down and make new ones)

function scrollUp(){
if(player.y < 300){
    platforms.forEach(platform =>{
        platform.y += player.dy;//moves platforms down by the speed of the player, so they move faster as the player moves faster
        if (platform.y > canvas.height){
            platforms.splice(platforms.indexOf(platform),1);
            var platformX = Math.random() * 330;
            var platformY = 0;
            platforms.push({
                x: platformX, 
                y: platformY, 
                width: PLATFORM_WIDTH, 
                height: PLATFORM_HEIGHT
            });
        }
    });
    player.y += player.dy;//moves player down by the speed of the player, so they move faster as the player moves faster
}




}

//GAME OVER

function checkLose(){
    if (player.y+DOODLE_HEIGHT >= canvas.height){
        alert("Game Over!");
        platforms = [];
        generatePlatform();
            player.x = doodleX;
            player.y = doodleY;
    }
}


</script>





</html>
